name: Upload SBOMs to sbomify.com

# Uploads enriched SBOMs to sbomify after they are generated on main.
# Only runs when the Generate SBOMs workflow completes successfully on main.

on:
  workflow_run:
    workflows: ["Generate SBOMs"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  upload:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        sbom_package:
          - postgres-sbom
          - redis-sbom
          - minio-sbom
          - sbomify-app-sbom
          - sbomify-keycloak-sbom
          - sbomify-caddy-dev-sbom
          - sbomify-minio-init-sbom

    steps:
      - name: Download enriched SBOM
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sbom_package }}
          path: sbom/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read image metadata
        id: meta
        run: |
          META=$(cat sbom/metadata.json)
          echo "name=$(echo "$META" | jq -r .name)" >> "$GITHUB_OUTPUT"
          echo "sbomify_component_id=$(echo "$META" | jq -r .sbomifyComponentId)" >> "$GITHUB_OUTPUT"

      - name: Upload to sbomify.com
        if: ${{ !startsWith(steps.meta.outputs.sbomify_component_id, 'PLACEHOLDER') }}
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.meta.outputs.sbomify_component_id }}
          SBOM_FILE: sbom/${{ steps.meta.outputs.name }}.enriched.cdx.json
          SBOM_FORMAT: cyclonedx
          UPLOAD: true
