name: Weekly cleanup

# Weekly maintenance: sweep stale PR-tagged images from GHCR (ADR-0003
# section 6) and garbage-collect the persistent Nix store on stickydisk.
# Image cleanup logic lives in bin/cleanup-pr-images.

on:
  schedule:
    # Weekly sweep: Sundays at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        run: echo "matrix=$(jq -c . .github/image-matrix.json)" >> "$GITHUB_OUTPUT"

  weekly-sweep:
    needs: load-matrix
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - name: Sweep stale PR images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bin/cleanup-pr-images sweep \
            --image "${{ matrix.image.name }}" \
            --days 7

  nix-store-gc:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      - name: Setup Nix (mounts stickydisk cache)
        uses: ./.github/actions/setup-nix

      - name: Report store size before GC
        run: |
          echo "### Nix store before GC" >> "$GITHUB_STEP_SUMMARY"
          du -sh /nix/store | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Store paths: $(ls /nix/store | wc -l)" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Root current derivations
        run: |
          # Root devshells so CI tools stay cached
          nix develop .#ci --command true
          nix develop .#default --command true

          # Root all image builds from the matrix so their deps survive GC
          for pkg in $(jq -r '.[].package' .github/image-matrix.json); do
            echo "Rooting .#$pkg"
            nix build --no-link ".#$pkg"
          done

      - name: Run nix garbage collection
        run: |
          # Delete profile generations older than 7 days, then collect
          # unreferenced store paths. Current derivations are protected
          # by the GC roots created above; this adds a time-based safety
          # net so recently-used paths survive even if not explicitly rooted.
          nix-collect-garbage --delete-older-than 7d

      - name: Report store size after GC
        run: |
          echo "### Nix store after GC" >> "$GITHUB_STEP_SUMMARY"
          du -sh /nix/store | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Store paths: $(ls /nix/store | wc -l)" | tee -a "$GITHUB_STEP_SUMMARY"
