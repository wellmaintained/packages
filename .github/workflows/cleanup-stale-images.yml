name: Cleanup stale images

# Weekly sweep of stale component-tagged images from GHCR (ADR-0005).
# Deletes image versions with no released-on: tag older than 7 days.
# Logic lives in common/lib/scripts/cleanup-stale-images; this workflow is a thin wrapper.

on:
  schedule:
    # Weekly sweep: Sundays at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: set
        run: echo "matrix=$(jq -c . .github/image-matrix.json)" >> "$GITHUB_OUTPUT"

  weekly-sweep:
    needs: load-matrix
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Sweep stale images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          common/lib/scripts/cleanup-stale-images sweep \
            --image "${{ matrix.image.name }}" \
            --days 7
