name: Pre-release collection

# On merge to main, create a collection pre-release (ADR-0005).
# Adds collection version tag to all images, creates GitHub pre-release.

on:
  push:
    branches: [main]
    paths:
      - common/**
      - apps/**
      - flake.nix
      - flake.lock
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to release (required for manual trigger)'
        required: false

permissions:
  actions: read
  contents: write
  packages: write
  security-events: write

# useblacksmith/stickydisk and DeterminateSystems/determinate-nix-action still
# ship node20 with no node24 releases available. Opt in early ahead of the
# June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        run: echo "matrix=$(jq -c . .github/image-matrix.json)" >> "$GITHUB_OUTPUT"

  resolve-pr:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha7: ${{ steps.pr.outputs.head_sha7 }}
      skip: ${{ steps.pr.outputs.skip }}
    steps:
      - name: Resolve PR from merge commit
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use workflow_dispatch input if provided
          if [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            echo "Using manual input: PR=${PR_NUMBER}"
          else
            # Find the PR that was merged to produce this push
            PR_NUMBER=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
              echo "WARNING: Could not resolve PR for commit ${{ github.sha }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Always look up HEAD SHA from the PR
          HEAD_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefOid --jq '.headRefOid')
          SHA7="${HEAD_SHA::7}"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha7=${SHA7}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  resolve-version:
    needs: [resolve-pr]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      collection_version: ${{ steps.version.outputs.collection_version }}
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: resolve-version

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute collection version
        id: version
        shell: nix develop .#ci -c bash -e {0}
        run: |
          REGISTRY="ghcr.io/wellmaintained/packages"
          SHA7="${{ needs.resolve-pr.outputs.head_sha7 }}"

          # Extract app version from sbomify-app's component tag ({name}-{version}-{sha7})
          COMPONENT_TAG=$(crane ls "${REGISTRY}/sbomify-app" | grep -- "-${SHA7}$" | head -1)
          if [ -z "$COMPONENT_TAG" ]; then
            echo "ERROR: No component tag found for sbomify-app with SHA ${SHA7}"
            exit 1
          fi
          # Strip -{sha7} suffix, then strip {name}- prefix
          WITHOUT_SHA="${COMPONENT_TAG%-"${SHA7}"}"
          APP_VERSION="${WITHOUT_SHA#sbomify-app-}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "==> App version (from tag ${COMPONENT_TAG}): ${APP_VERSION}"

          # Compute build number: count existing tags for today + 1
          TODAY=$(date -u '+%Y%m%d')
          PREFIX="sbomify-v${APP_VERSION}-${TODAY}."
          EXISTING=$(git tag -l "${PREFIX}*" | wc -l)
          BUILD_NUMBER=$((EXISTING + 1))

          COLLECTION_VERSION="sbomify-v${APP_VERSION}-${TODAY}.${BUILD_NUMBER}"
          echo "collection_version=${COLLECTION_VERSION}" >> "$GITHUB_OUTPUT"
          echo "==> Collection version: ${COLLECTION_VERSION}"

  tag-and-scan:
    needs: [load-matrix, resolve-pr, resolve-version]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: tag-and-scan

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve component tag from GHCR
        id: component
        shell: nix develop .#ci -c bash -e {0}
        run: |
          REGISTRY="ghcr.io/wellmaintained/packages"
          SHA7="${{ needs.resolve-pr.outputs.head_sha7 }}"
          NAME="${{ matrix.image.name }}"

          # Find the component tag ({name}-{version}-{sha7}) for this image
          COMPONENT_TAG=$(crane ls "${REGISTRY}/${NAME}" | grep -- "-${SHA7}$" | head -1)
          if [ -z "$COMPONENT_TAG" ]; then
            echo "ERROR: No component tag found for ${NAME} with SHA ${SHA7}"
            exit 1
          fi
          echo "tag=${COMPONENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "==> Component tag: ${COMPONENT_TAG}"

      - name: Add collection tag
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/tag-collection \
            --image "${{ matrix.image.name }}" \
            --component-tag "${{ steps.component.outputs.tag }}" \
            --collection-version "${{ needs.resolve-version.outputs.collection_version }}"

      - name: Extract SBOM from OCI attestation
        id: extract-sbom
        continue-on-error: true
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/extract-sbom-attestation \
            --image "${{ matrix.image.name }}" \
            --tag "${{ steps.component.outputs.tag }}" \
            --output "sbom/${{ matrix.image.name }}.enriched.cdx.json"

      - name: Persist Grype vulnerability database
        if: steps.extract-sbom.outcome == 'success'
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-${{ matrix.image.name }}-grype-db-${{ runner.os }}
          path: ~/.cache/grype/db

      - name: Scan SBOM for vulnerabilities
        id: grype
        if: steps.extract-sbom.outcome == 'success'
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/scan-sbom \
            --sbom "sbom/${{ matrix.image.name }}.enriched.cdx.json" \
            --output "sbom/${{ matrix.image.name }}.sarif"

      - name: Upload SARIF to GitHub Security
        if: steps.grype.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sbom/${{ matrix.image.name }}.sarif
          category: vulnerability-scan/${{ matrix.image.name }}

      - name: Upload SBOM to sbomify.com
        if: ${{ !startsWith(matrix.image.sbomify_component_id, 'PLACEHOLDER') }}
        uses: sbomify/sbomify-action@d96675bf9fcbeba415e618895af758a6216395d0 # v26.1.0
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ matrix.image.sbomify_component_id }}
          SBOM_FILE: sbom/${{ matrix.image.name }}.enriched.cdx.json
          SBOM_FORMAT: cyclonedx
          UPLOAD: true

  create-release:
    needs: [resolve-pr, resolve-version, tag-and-scan, load-matrix]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: create-release

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release notes
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/create-release-notes \
            --collection-version "${{ needs.resolve-version.outputs.collection_version }}" \
            --pr-number "${{ needs.resolve-pr.outputs.pr_number }}" \
            --app-version "${{ needs.resolve-version.outputs.app_version }}" \
            --sha7 "${{ needs.resolve-pr.outputs.head_sha7 }}" \
            --matrix-json '${{ needs.load-matrix.outputs.matrix }}' \
            --output release-notes.md

      - name: Create git tag and GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COLLECTION_VERSION="${{ needs.resolve-version.outputs.collection_version }}"

          git tag "${COLLECTION_VERSION}"
          git push origin "${COLLECTION_VERSION}"

          gh release create "${COLLECTION_VERSION}" \
            --title "${COLLECTION_VERSION}" \
            --notes-file release-notes.md \
            --prerelease
