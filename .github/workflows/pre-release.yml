name: Pre-release collection

# On merge to main, create a collection pre-release (ADR-0005).
# Adds collection version tag to all images, creates GitHub pre-release.

on:
  push:
    branches: [main]
    paths:
      - common/**
      - apps/**
      - flake.nix
      - flake.lock
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to release (required for manual trigger)'
        required: false

permissions:
  actions: read
  contents: write
  packages: write
  security-events: write

# useblacksmith/stickydisk and DeterminateSystems/determinate-nix-action still
# ship node20 with no node24 releases available. Opt in early ahead of the
# June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io/wellmaintained/packages

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: set
        run: echo "matrix=$(jq -c . .github/image-matrix.json)" >> "$GITHUB_OUTPUT"

  resolve-pr:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha7: ${{ steps.pr.outputs.head_sha7 }}
      skip: ${{ steps.pr.outputs.skip }}
    steps:
      - name: Resolve PR from merge commit
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use workflow_dispatch input if provided
          if [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            echo "Using manual input: PR=${PR_NUMBER}"
          else
            # Find the PR that was merged to produce this push
            PR_NUMBER=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
              echo "WARNING: Could not resolve PR for commit ${{ github.sha }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Always look up HEAD SHA from the PR
          HEAD_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefOid --jq '.headRefOid')
          SHA7="${HEAD_SHA::7}"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha7=${SHA7}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  resolve-version:
    needs: [resolve-pr]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      collection_version: ${{ steps.version.outputs.collection_version }}
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: resolve-version

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute collection version
        id: version
        shell: nix develop .#ci -c bash -e {0}
        run: |
          REGISTRY="${GHCR_REGISTRY}"
          SHA7="${{ needs.resolve-pr.outputs.head_sha7 }}"

          # Extract app version from sbomify-app's component tag ({name}-{version}-{sha7})
          COMPONENT_TAG=$(common/lib/scripts/resolve-component-tag \
            --image sbomify-app --sha7 "$SHA7" --registry "$REGISTRY")
          # Strip -{sha7} suffix, then strip {name}- prefix
          WITHOUT_SHA="${COMPONENT_TAG%-"${SHA7}"}"
          APP_VERSION="${WITHOUT_SHA#sbomify-app-}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "==> App version (from tag ${COMPONENT_TAG}): ${APP_VERSION}"

          # Compute build number: count existing tags for today + 1
          TODAY=$(date -u '+%Y%m%d')
          PREFIX="sbomify-v${APP_VERSION}-${TODAY}."
          EXISTING=$(git tag -l "${PREFIX}*" | wc -l)
          BUILD_NUMBER=$((EXISTING + 1))

          COLLECTION_VERSION="sbomify-v${APP_VERSION}-${TODAY}.${BUILD_NUMBER}"
          echo "collection_version=${COLLECTION_VERSION}" >> "$GITHUB_OUTPUT"
          echo "==> Collection version: ${COLLECTION_VERSION}"

  tag-and-scan:
    needs: [load-matrix, resolve-pr, resolve-version]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: tag-and-scan

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve component tag from GHCR
        id: component
        shell: nix develop .#ci -c bash -e {0}
        run: |
          COMPONENT_TAG=$(common/lib/scripts/resolve-component-tag \
            --image "${{ matrix.image.name }}" \
            --sha7 "${{ needs.resolve-pr.outputs.head_sha7 }}")
          echo "component_tag=${COMPONENT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Add collection tag
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/tag-collection \
            --image "${{ matrix.image.name }}" \
            --component-tag "${{ steps.component.outputs.component_tag }}" \
            --collection-version "${{ needs.resolve-version.outputs.collection_version }}"

      - name: Extract SBOM from OCI attestation
        id: extract-sbom
        continue-on-error: true
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/extract-sbom-attestation \
            --image "${{ matrix.image.name }}" \
            --tag "${{ steps.component.outputs.component_tag }}" \
            --output "sbom/${{ matrix.image.name }}.enriched.cdx.json"

      - name: Persist Grype vulnerability database
        if: steps.extract-sbom.outcome == 'success'
        uses: useblacksmith/stickydisk@41873b1513bb679f9c115504cbd13d3660432504 # v1
        with:
          key: ${{ github.repository }}-${{ matrix.image.name }}-grype-db-${{ runner.os }}
          path: ~/.cache/grype/db

      - name: Resolve per-image VEX file
        id: vex
        if: steps.extract-sbom.outcome == 'success'
        shell: nix develop .#ci -c bash -e {0}
        run: |
          VEX_PATH=$(common/lib/scripts/resolve-vex-file --image "${{ matrix.image.name }}")
          if [ -n "$VEX_PATH" ]; then
            echo "path=${VEX_PATH}" >> "$GITHUB_OUTPUT"
            echo "==> Found VEX file: ${VEX_PATH}"
          else
            echo "==> No VEX file found for ${{ matrix.image.name }}, scanning without suppression"
          fi

      - name: Scan SBOM for vulnerabilities
        id: grype
        if: steps.extract-sbom.outcome == 'success'
        shell: nix develop .#ci -c bash -e {0}
        run: |
          VEX_FLAG=""
          if [ -n "${{ steps.vex.outputs.path }}" ]; then
            VEX_FLAG="--vex ${{ steps.vex.outputs.path }}"
          fi
          common/lib/scripts/scan-sbom \
            --sbom "sbom/${{ matrix.image.name }}.enriched.cdx.json" \
            --output "sbom/${{ matrix.image.name }}.sarif" \
            --additional-output "json=sbom/${{ matrix.image.name }}.scan.json" \
            $VEX_FLAG

      - name: Upload SARIF to GitHub Security
        if: steps.grype.outcome == 'success'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: sbom/${{ matrix.image.name }}.sarif
          category: vulnerability-scan/sbomify/${{ matrix.image.name }}

      - name: Upload release artifacts
        if: steps.extract-sbom.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sbom-${{ matrix.image.name }}
          path: |
            sbom/${{ matrix.image.name }}.enriched.cdx.json
            sbom/${{ matrix.image.name }}.scan.json
          retention-days: 7

      - name: Upload SBOM to sbomify.com
        if: ${{ !startsWith(matrix.image.sbomify_component_id, 'PLACEHOLDER') }}
        continue-on-error: true
        shell: nix develop .#ci -c bash -e {0}
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
        run: |
          sbomify-action \
            --token "$TOKEN" \
            --component-id "${{ matrix.image.sbomify_component_id }}" \
            --sbom-file "sbom/${{ matrix.image.name }}.enriched.cdx.json" \
            --sbom-format cyclonedx \
            --upload

  build-release-website:
    needs: [resolve-pr, resolve-version, tag-and-scan, load-matrix]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: build-release-website

      - name: Download all per-image artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: sbom-*
          path: release-artifacts/sboms
          merge-multiple: true

      - name: Extract release data for Hugo
        shell: nix develop .#ci -c bash -e {0}
        env:
          COLLECTION_VERSION: ${{ needs.resolve-version.outputs.collection_version }}
          APP_VERSION: ${{ needs.resolve-version.outputs.app_version }}
        run: |
          DATE=$(echo "$COLLECTION_VERSION" | grep -oP '\d{8}' | head -1 | sed 's/\(....\)\(..\)\(..\)/\1-\2-\3/')
          common/lib/scripts/extract-release-data \
            --sbom-dir release-artifacts/sboms \
            --scan-dir release-artifacts/sboms \
            --image-matrix .github/image-matrix.json \
            --output-dir apps/sbomify/release-website \
            --tag "$COLLECTION_VERSION" \
            --version "$APP_VERSION" \
            --date "$DATE"

      - name: Build site
        shell: nix develop .#ci -c bash -e {0}
        run: hugo --minify -s apps/sbomify/release-website

      - name: Bundle compliance artifacts
        shell: nix develop .#ci -c bash -e {0}
        run: |
          shopt -s nullglob
          BUNDLE_DIR="compliance-bundle"
          mkdir -p "${BUNDLE_DIR}/sboms" "${BUNDLE_DIR}/scans" "${BUNDLE_DIR}/vex"

          # Copy SBOMs (required — fail if missing)
          cp release-artifacts/sboms/*.enriched.cdx.json "${BUNDLE_DIR}/sboms/"

          # Copy scans (optional — some images may not have scan results)
          SCAN_FILES=(release-artifacts/sboms/*.scan.json)
          if [ ${#SCAN_FILES[@]} -gt 0 ]; then
            cp "${SCAN_FILES[@]}" "${BUNDLE_DIR}/scans/"
          else
            echo "WARNING: No scan files found" >&2
          fi

          # Copy VEX files for each image
          for IMAGE in $(jq -r '.[].name' .github/image-matrix.json); do
            VEX_PATH=$(common/lib/scripts/resolve-vex-file --image "$IMAGE")
            if [ -n "$VEX_PATH" ]; then
              cp "$VEX_PATH" "${BUNDLE_DIR}/vex/"
            fi
          done

          # Copy Hugo data files
          cp apps/sbomify/release-website/data/release.json "${BUNDLE_DIR}/"
          cp apps/sbomify/release-website/data/vulnerabilities.json "${BUNDLE_DIR}/"
          cp apps/sbomify/release-website/data/licenses.json "${BUNDLE_DIR}/"

          # Copy static site
          cp -r apps/sbomify/release-website/public "${BUNDLE_DIR}/website"

          # Create ZIP
          COLLECTION_VERSION="${{ needs.resolve-version.outputs.collection_version }}"
          cd "${BUNDLE_DIR}"
          zip -r "../${COLLECTION_VERSION}-compliance.zip" .

      - name: Upload compliance bundle
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: compliance-bundle
          path: ${{ needs.resolve-version.outputs.collection_version }}-compliance.zip
          retention-days: 7

  create-release:
    needs: [resolve-pr, resolve-version, tag-and-scan, build-release-website, load-matrix]
    if: needs.resolve-pr.outputs.skip != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: create-release

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release notes
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/create-release-notes \
            --collection-version "${{ needs.resolve-version.outputs.collection_version }}" \
            --pr-number "${{ needs.resolve-pr.outputs.pr_number }}" \
            --app-version "${{ needs.resolve-version.outputs.app_version }}" \
            --sha7 "${{ needs.resolve-pr.outputs.head_sha7 }}" \
            --matrix-json '${{ needs.load-matrix.outputs.matrix }}' \
            --output release-notes.md

      - name: Download compliance bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: compliance-bundle

      - name: Create git tag and GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COLLECTION_VERSION="${{ needs.resolve-version.outputs.collection_version }}"

          # Create tag via the GitHub API (gh release create) instead of git push.
          # git push rejects tags on commits containing workflow file changes
          # because GITHUB_TOKEN lacks the 'workflows' permission (a GitHub
          # security feature). The Releases API does not enforce this restriction.
          gh release create "${COLLECTION_VERSION}" \
            --target "${{ github.sha }}" \
            --title "${COLLECTION_VERSION}" \
            --notes-file release-notes.md \
            --prerelease \
            "${COLLECTION_VERSION}-compliance.zip"
