name: Rescan vulnerabilities

# Weekly rescan of latest release SBOMs for new vulnerabilities.
# Runs Monday 06:00 UTC on schedule + manual dispatch.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io/wellmaintained/packages

jobs:
  resolve-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      collection_version: ${{ steps.tag.outputs.collection_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve latest sbomify release tag
        id: tag
        run: |
          TAG=$(git tag -l 'sbomify-v*' --sort=-version:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "No sbomify-v* tag found" >&2
            exit 1
          fi
          echo "collection_version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "==> Latest release tag: ${TAG}"

  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: set
        run: echo "matrix=$(jq -c . .github/image-matrix.json)" >> "$GITHUB_OUTPUT"

  scan:
    needs: [resolve-release, load-matrix]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: rescan-${{ matrix.image.name }}

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SBOM from OCI attestation
        id: extract-sbom
        continue-on-error: true
        shell: nix develop .#ci -c bash -e {0}
        run: |
          common/lib/scripts/extract-sbom-attestation \
            --image "${{ matrix.image.name }}" \
            --tag "${{ needs.resolve-release.outputs.collection_version }}" \
            --output "sbom/${{ matrix.image.name }}.enriched.cdx.json"

      - name: Persist Grype vulnerability database
        if: steps.extract-sbom.outcome == 'success'
        uses: useblacksmith/stickydisk@41873b1513bb679f9c115504cbd13d3660432504 # v1
        with:
          key: ${{ github.repository }}-${{ matrix.image.name }}-grype-db-${{ runner.os }}
          path: ~/.cache/grype/db

      - name: Resolve per-image VEX file
        id: vex
        if: steps.extract-sbom.outcome == 'success'
        run: |
          IMAGE="${{ matrix.image.name }}"
          for candidate in "common/images/${IMAGE}.vex.yaml" "apps/sbomify/images/${IMAGE}.vex.yaml"; do
            if [ -f "$candidate" ]; then
              echo "path=${candidate}" >> "$GITHUB_OUTPUT"
              echo "==> Found VEX file: ${candidate}"
              exit 0
            fi
          done
          echo "==> No VEX file found for ${IMAGE}, scanning without suppression"

      - name: Scan SBOM for vulnerabilities
        id: grype
        if: steps.extract-sbom.outcome == 'success'
        shell: nix develop .#ci -c bash -e {0}
        run: |
          VEX_FLAG=""
          if [ -n "${{ steps.vex.outputs.path }}" ]; then
            VEX_FLAG="--vex ${{ steps.vex.outputs.path }}"
          fi
          common/lib/scripts/scan-sbom \
            --sbom "sbom/${{ matrix.image.name }}.enriched.cdx.json" \
            --output "sbom/${{ matrix.image.name }}.sarif" \
            $VEX_FLAG

      - name: Upload SARIF to GitHub Security
        if: steps.grype.outcome == 'success'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: sbom/${{ matrix.image.name }}.sarif
          category: vulnerability-scan/sbomify/${{ matrix.image.name }}
