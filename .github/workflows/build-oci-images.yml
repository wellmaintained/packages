name: Build and publish OCI images

on:
  push:
    branches:
      - main
    paths:
      - images/**
      - deployments/sbomify/**
      - flake.nix
      - flake.lock
      - .github/workflows/build-oci-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: postgres
            package: postgres-image
            nixpkg: postgresql_17
          - name: redis
            package: redis-image
            nixpkg: redis
          - name: minio
            package: minio-image
            nixpkg: minio
          - name: minio-client
            package: minio-client-image
            nixpkg: minio-client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          diagnostic-endpoint: ""

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream version
        id: version
        run: |
          VERSION=$(nix eval --raw nixpkgs#${{ matrix.image.nixpkg }}.version)
          echo "upstream=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: nix build .#${{ matrix.image.package }}

      - name: Load and push image
        run: |
          # Load the Nix-built image into Docker
          docker load < result

          # Get the image name and tag from the loaded output
          LOADED_IMAGE=$(docker load < result 2>&1 | grep -oP 'Loaded image: \K.*')

          # Tag for GHCR
          GHCR_REPO="ghcr.io/wellmaintained/packages/${{ matrix.image.name }}"
          VERSION="${{ steps.version.outputs.upstream }}"
          CALVER=$(date -u '+%Y%m%d%H%M')

          docker tag "${LOADED_IMAGE}" "${GHCR_REPO}:latest"
          docker tag "${LOADED_IMAGE}" "${GHCR_REPO}:${VERSION}"
          docker tag "${LOADED_IMAGE}" "${GHCR_REPO}:${VERSION}-${CALVER}"

          docker push "${GHCR_REPO}:latest"
          docker push "${GHCR_REPO}:${VERSION}"
          docker push "${GHCR_REPO}:${VERSION}-${CALVER}"

  build-and-push-sbomify-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: sbomify-app
            package: sbomify-app-image
          - name: sbomify-keycloak
            package: sbomify-keycloak-image
          - name: sbomify-caddy-dev
            package: sbomify-caddy-dev-image
          - name: sbomify-minio-init
            package: sbomify-minio-init-image
    steps:
      - name: Checkout packages
        uses: actions/checkout@v5
        with:
          path: packages

      - name: Checkout sbomify
        uses: actions/checkout@v5
        with:
          repository: sbomify/sbomify
          path: sbomify

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          diagnostic-endpoint: ""

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get sbomify version
        id: version
        run: |
          VERSION=$(grep '^version' sbomify/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "upstream=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image
        working-directory: packages
        run: nix build .#${{ matrix.image.package }}

      - name: Load and push image
        working-directory: packages
        run: |
          # Load the Nix-built image into Docker
          docker load < result

          # Get the image name and tag from the loaded output
          LOADED_IMAGE=$(docker load < result 2>&1 | grep -oP 'Loaded image: \K.*')

          # Tag for GHCR
          GHCR_REPO="ghcr.io/wellmaintained/packages/${{ matrix.image.name }}"
          VERSION="${{ steps.version.outputs.upstream }}"
          CALVER=$(date -u '+%Y%m%d%H%M')

          docker tag "${LOADED_IMAGE}" "${GHCR_REPO}:latest"
          docker tag "${LOADED_IMAGE}" "${GHCR_REPO}:${VERSION}"
          docker tag "${LOADED_IMAGE}" "${GHCR_REPO}:${VERSION}-${CALVER}"

          docker push "${GHCR_REPO}:latest"
          docker push "${GHCR_REPO}:${VERSION}"
          docker push "${GHCR_REPO}:${VERSION}-${CALVER}"
