name: Build images and SBOMs

# Combined image + SBOM build for PRs (ADR-0003: build once, promote on merge).
# Logic lives in common/lib/scripts/build-and-push; this workflow is a thin wrapper.

on:
  pull_request:
    branches: [main]
    paths:
      - common/**
      - apps/**
      - flake.nix
      - flake.lock
      - .github/workflows/build.yml
      - .github/image-matrix.json
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

# useblacksmith/stickydisk and DeterminateSystems/determinate-nix-action still
# ship node20 with no node24 releases available. Opt in early ahead of the
# June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io/wellmaintained/packages

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On workflow_dispatch, build everything
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "matrix=$(jq -c '[.[] | del(.paths)]' .github/image-matrix.json)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get changed files from the PR
          CHANGED_FILE="$(mktemp)"
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename' > "$CHANGED_FILE"

          MATRIX=$(common/lib/scripts/filter-build-matrix .github/image-matrix.json "$CHANGED_FILE")
          rm -f "$CHANGED_FILE"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Write filtered matrix file
        run: echo '${{ steps.set.outputs.matrix }}' > filtered-matrix.json
      - name: Upload filtered matrix
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: filtered-matrix
          path: filtered-matrix.json

  build:
    needs: load-matrix
    if: ${{ needs.load-matrix.outputs.matrix != '[]' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: nix develop .#ci -c bash -e {0}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: ${{ matrix.image.name }}
          nix-package: ${{ matrix.image.package }}

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image metadata
        id: meta
        shell: bash
        run: |
          META=$(common/lib/scripts/build-and-push metadata --package "${{ matrix.image.package }}")
          echo "$META" > metadata.json
          echo "name=$(echo "$META" | jq -r .name)" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$META" | jq -r .version)" >> "$GITHUB_OUTPUT"
          echo "sbomify_component_id=$(echo "$META" | jq -r .sbomifyComponentId)" >> "$GITHUB_OUTPUT"

      - name: Build image
        shell: bash
        run: common/lib/scripts/build-and-push build --package "${{ matrix.image.package }}"

      - name: Compute component tag
        id: tag
        shell: bash
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SHA7="${HEAD_SHA::7}"
          IMAGE_NAME="${{ steps.meta.outputs.name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          echo "component_tag=${IMAGE_NAME}-${VERSION}-${SHA7}" >> "$GITHUB_OUTPUT"
          echo "ghcr_repo=${GHCR_REGISTRY}/${{ matrix.image.name }}" >> "$GITHUB_OUTPUT"

      - name: Push image to GHCR
        id: push
        shell: bash
        run: |
          DIGEST=$(common/lib/scripts/build-and-push push \
            --registry "${{ steps.tag.outputs.ghcr_repo }}" \
            --tag "${{ steps.tag.outputs.component_tag }}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign image
        run: |
          common/lib/scripts/build-and-push sign \
            --image-ref "${{ steps.tag.outputs.ghcr_repo }}@${{ steps.push.outputs.digest }}"

      - name: Build SBOM
        id: sbom
        shell: bash
        run: |
          SBOM_PATH=$(common/lib/scripts/build-and-push sbom \
            --package "${{ matrix.image.package }}" \
            --name "${{ matrix.image.name }}")
          echo "path=${SBOM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Enrich SBOM
        uses: sbomify/sbomify-action@d96675bf9fcbeba415e618895af758a6216395d0 # v26.1.0
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.meta.outputs.sbomify_component_id }}
          COMPONENT_NAME: ${{ steps.meta.outputs.name }}
          COMPONENT_VERSION: ${{ steps.meta.outputs.version }}
          SBOM_FILE: ${{ steps.sbom.outputs.path }}
          SBOM_FORMAT: cyclonedx
          AUGMENT: true
          ENRICH: true
          UPLOAD: false
          OUTPUT_FILE: ${{ matrix.image.name }}.enriched.cdx.json

      - name: Fall back to raw SBOM if enrichment skipped
        shell: bash
        run: |
          if [ ! -f "${{ matrix.image.name }}.enriched.cdx.json" ]; then
            cp "${{ steps.sbom.outputs.path }}" "${{ matrix.image.name }}.enriched.cdx.json"
          fi

      - name: Attest SBOM and provenance
        run: |
          IMAGE_REF="${{ steps.tag.outputs.ghcr_repo }}@${{ steps.push.outputs.digest }}"

          # Generate SLSA provenance
          common/lib/scripts/build-and-push provenance \
            --run-id "${{ github.run_id }}" \
            --server-url "${{ github.server_url }}" \
            --repository "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --sha "${{ github.sha }}" \
            > provenance.json

          # Attach both attestations
          common/lib/scripts/build-and-push attest \
            --image-ref "${IMAGE_REF}" \
            --sbom-file "${{ matrix.image.name }}.enriched.cdx.json" \
            --provenance-file provenance.json
