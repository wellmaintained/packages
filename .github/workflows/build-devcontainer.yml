name: Build sbomify devcontainer image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - flake.nix
      - flake.lock
      - .github/workflows/build-devcontainer.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# useblacksmith/setup-docker-builder and build-push-action still ship node20
# with no node24 releases available. Opt in early ahead of the June 2026
# forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io/wellmaintained/packages

jobs:
  build-and-push:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      IMAGE_NAME: ${{ env.GHCR_REGISTRY }}/devcontainer-sbomify
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Generate Dockerfile
        run: |
          cat > Dockerfile.devcontainer-sbomify <<'EOF'
          FROM nixos/nix:2.24.14

          ENV CI=true
          ENV NIX_CONFIG="experimental-features = nix-command flakes"

          # Install core tools from nixpkgs.
          RUN nix profile install \
              nixpkgs#bashInteractive \
              nixpkgs#curl \
              nixpkgs#git \
              nixpkgs#jq \
              nixpkgs#nodejs_22

          # Install agent CLIs with their official installers.
          RUN curl -fsSL https://claude.ai/install.sh | bash && \
              cp /root/.local/bin/claude /usr/local/bin/claude && \
              chmod +x /usr/local/bin/claude

          RUN curl -fsSL https://cursor.com/install | bash && \
              ln -s "$(find /root/.local/share/cursor-agent -name cursor-agent -type f | head -1)" /usr/local/bin/cursor-agent

          RUN curl -fsSL https://opencode.ai/install | bash && \
              cp /root/.opencode/bin/opencode /usr/local/bin/opencode && \
              chmod +x /usr/local/bin/opencode

          # Pin the flake context into the image.
          WORKDIR /opt/wellmaintained-packages
          COPY flake.nix flake.lock ./

          # Realize the sbomify devShell closure during build.
          RUN nix develop .#sbomify -c bash -lc '\
              python3 --version && \
              uv --version && \
              bun --version && \
              node --version'

          # Ensure all runtime commands execute inside the sbomify devShell.
          RUN cat > /usr/local/bin/with-sbomify-devshell <<'WRAP' && chmod +x /usr/local/bin/with-sbomify-devshell
          #!/usr/bin/env bash
          set -euo pipefail
          exec nix develop /opt/wellmaintained-packages#sbomify -c "$@"
          WRAP

          ENTRYPOINT ["/usr/local/bin/with-sbomify-devshell"]
          CMD ["bash"]
          EOF

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.devcontainer-sbomify
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
