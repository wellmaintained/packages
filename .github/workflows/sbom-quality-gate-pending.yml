name: SBOM quality gate (pending)

# Posts an early "pending" sticky PR comment so authors see visual feedback
# while build.yml runs. Uses the same sticky header as the quality
# gate report so the real scores replace this placeholder automatically.

on:
  pull_request:
    branches: [main]
    paths:
      - common/**
      - apps/**
      - flake.nix
      - flake.lock

permissions:
  pull-requests: write

# marocchino/sticky-pull-request-comment still ships node20 with no node24
# release available. Opt in early ahead of the June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pending:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Post pending comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: sbom-quality-gate
          message: |
            ## SBOM Quality Gate
            ⏳ Generating SBOMs and calculating quality scores... please wait.
