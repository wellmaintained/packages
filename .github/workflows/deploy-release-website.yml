name: Deploy release website

on:
  push:
    branches: [main]
    paths:
      - apps/sbomify/release-website/**
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io/wellmaintained/packages

jobs:
  tag-released:
    if: github.event_name == 'release'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: tag-released

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add released-on tags to collection images
        shell: nix develop .#ci -c bash -e {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_BODY="${{ github.event.release.body }}"
          REGISTRY="${GHCR_REGISTRY}"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%S')

          echo "==> Tagging images with released-on:${TIMESTAMP}"

          # Parse the release body markdown table for image names and digests
          # Table format: | `image-name` | `component-tag` | `sha256:...` |
          echo "$RELEASE_BODY" | grep -E '^\|.*sha256:' | while IFS='|' read -r _ name _ digest _; do
            # Strip backticks and whitespace
            name=$(echo "$name" | tr -d '` ' )
            digest=$(echo "$digest" | tr -d '` ' )

            if [[ -z "$name" || -z "$digest" ]]; then
              echo "  Skipping unparseable row" >&2
              continue
            fi

            echo "  ${name}: adding released-on:${TIMESTAMP} to ${digest}"
            crane tag "${REGISTRY}/${name}@${digest}" "released-on:${TIMESTAMP}" || {
              echo "  WARNING: Failed to tag ${name}@${digest}" >&2
            }
          done

          echo "==> Done tagging released images"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.0'
          extended: true

      - name: Setup Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build site
        working-directory: apps/sbomify/release-website
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/sbomify/release-website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
