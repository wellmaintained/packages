name: Deploy release website

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (e.g. sbomify-v26.1.0-20260405.6).'
        required: true

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io/wellmaintained/packages

jobs:
  tag-released:
    if: github.event_name == 'release'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: tag-released

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add released-on tags to collection images
        shell: nix develop .#ci -c bash -e {0}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          REGISTRY="${GHCR_REGISTRY}"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%S')

          echo "==> Tagging images with released-on:${TIMESTAMP}"

          # Parse the release body markdown table for image names and digests
          # Table format: | `image-name` | `component-tag` | `sha256:...` |
          echo "$RELEASE_BODY" | grep -E '^\|.*sha256:' | while IFS='|' read -r _ name _ digest _; do
            # Strip backticks and whitespace
            name=$(echo "$name" | tr -d '\x60 ' )
            digest=$(echo "$digest" | tr -d '\x60 ' )

            if [[ -z "$name" || -z "$digest" ]]; then
              echo "  Skipping unparseable row" >&2
              continue
            fi

            echo "  ${name}: adding released-on:${TIMESTAMP} to ${digest}"
            crane tag "${REGISTRY}/${name}@${digest}" "released-on:${TIMESTAMP}" || {
              echo "  WARNING: Failed to tag ${name}@${digest}" >&2
            }
          done

          echo "==> Done tagging released images"

  build-and-deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          stickydisk-suffix: deploy-release-website

      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG_NAME"
          else
            TAG="$INPUT_TAG"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "==> Deploying release: ${TAG}"

      - name: Download compliance bundle from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "==> Downloading ${TAG}-compliance.zip"
          gh release download "${TAG}" \
            --pattern "${TAG}-compliance.zip" \
            --dir . || {
            echo "::error::Failed to download ${TAG}-compliance.zip. Does the release exist and have the compliance bundle attached?"
            exit 1
          }
          mkdir -p compliance-data
          cd compliance-data && unzip "../${TAG}-compliance.zip"

      - name: Extract release data
        shell: nix develop .#ci -c bash -e {0}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if [[ ! -f compliance-data/release.json ]]; then
            echo "::error::release.json not found in compliance bundle"
            exit 1
          fi
          VERSION=$(jq -r '.version' compliance-data/release.json)
          DATE=$(jq -r '.date' compliance-data/release.json)

          common/lib/scripts/extract-release-data \
            --sbom-dir compliance-data/sboms \
            --scan-dir compliance-data/scans \
            --image-matrix .github/image-matrix.json \
            --output-dir apps/sbomify/release-website \
            --tag "$TAG" \
            --version "$VERSION" \
            --date "$DATE"

      - name: Build Hugo site
        shell: nix develop .#ci -c bash -e {0}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          hugo --minify -s apps/sbomify/release-website \
            --baseURL "https://wellmaintained.github.io/packages/releases/${TAG}/"

      - name: Prepare gh-pages content
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p "gh-pages-staging/releases/${TAG}"
          cp -r apps/sbomify/release-website/public/* "gh-pages-staging/releases/${TAG}/"

          # Create root redirect to latest release
          cat > gh-pages-staging/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=releases/${TAG}/"></head>
          <body><a href="releases/${TAG}/">Redirect to latest release</a></body>
          </html>
          EOF

          touch gh-pages-staging/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-staging
          keep_files: true
