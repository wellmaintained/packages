name: Generate SBOMs

# Generates and enriches CycloneDX SBOMs for all Nix-built OCI images.
# Enriched SBOMs are uploaded as artifacts for downstream workflows
# (quality gate on PRs, upload to sbomify on merge).

on:
  pull_request:
    branches: [main]
    paths: &sbom-paths
      - images/**
      - deployments/sbomify/**
      - flake.nix
      - flake.lock
      - bin/patch-sbom-root
  push:
    branches: [main]
    paths: *sbom-paths
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  generate:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        sbom_package:
          - postgres-sbom
          - redis-sbom
          - minio-sbom
          - sbomify-app-sbom
          - sbomify-keycloak-sbom
          - sbomify-caddy-dev-sbom
          - sbomify-minio-init-sbom

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Get image metadata
        id: meta
        run: |
          META=$(nix eval --json .#${{ matrix.sbom_package }}.imageMetadata)
          echo "$META" > metadata.json
          echo "name=$(echo "$META" | jq -r .name)" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$META" | jq -r .version)" >> "$GITHUB_OUTPUT"
          echo "license=$(echo "$META" | jq -r .license)" >> "$GITHUB_OUTPUT"
          echo "sbomify_component_id=$(echo "$META" | jq -r .sbomifyComponentId)" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: |
          nix build .#${{ matrix.sbom_package }}
          cp -L result ${{ steps.meta.outputs.name }}.cdx.json

      - name: Convert to CycloneDX 1.6
        run: |
          SBOM="${{ steps.meta.outputs.name }}.cdx.json"
          nix build nixpkgs#cyclonedx-cli -o cyclonedx-cli
          cyclonedx-cli/bin/cyclonedx convert \
            --input-file "$SBOM" \
            --output-file "${SBOM}.tmp" \
            --input-format json \
            --output-format json \
            --output-version v1_6
          mv "${SBOM}.tmp" "$SBOM"

      - name: Patch root component metadata
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SBOM="${{ steps.meta.outputs.name }}.cdx.json"

          bin/patch-sbom-root \
            --name "wellmaintained/packages/${{ steps.meta.outputs.name }}-image" \
            --version "$VERSION" \
            --purl "pkg:docker/wellmaintained/packages/${{ steps.meta.outputs.name }}@${VERSION}" \
            --license "${{ steps.meta.outputs.license }}" \
            < "$SBOM" > "${SBOM}.tmp" && mv "${SBOM}.tmp" "$SBOM"

      - name: Enrich SBOM
        uses: sbomify/sbomify-action@master
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.meta.outputs.sbomify_component_id }}
          COMPONENT_NAME: ${{ steps.meta.outputs.name }}
          COMPONENT_VERSION: ${{ steps.meta.outputs.version }}
          SBOM_FILE: ${{ steps.meta.outputs.name }}.cdx.json
          SBOM_FORMAT: cyclonedx
          AUGMENT: true
          ENRICH: true
          UPLOAD: false
          OUTPUT_FILE: ${{ steps.meta.outputs.name }}.enriched.cdx.json

      - name: Fall back to raw SBOM if enrichment skipped
        run: |
          if [ ! -f "${{ steps.meta.outputs.name }}.enriched.cdx.json" ]; then
            cp "${{ steps.meta.outputs.name }}.cdx.json" "${{ steps.meta.outputs.name }}.enriched.cdx.json"
          fi

      - name: Upload enriched SBOM
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.sbom_package }}
          path: |
            ${{ steps.meta.outputs.name }}.enriched.cdx.json
            metadata.json
