name: SBOM quality gate

# Scores the PR's SBOMs and compares against the baseline from main.
# Blocks merging if any image's quality score regresses.
#
# Requires the "Build images and SBOMs" workflow to have run first on this PR
# (it produces the enriched SBOM artifacts we score here).

on:
  workflow_run:
    workflows: ["Build images and SBOMs"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  load-matrix:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        run: echo "matrix=$(jq -c . .github/image-matrix.json)" >> "$GITHUB_OUTPUT"

  score:
    needs: load-matrix
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Download PR SBOM
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image.name }}-sbom
          path: current/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read image metadata
        id: meta
        run: echo "name=$(jq -r .name current/metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Score current SBOM
        run: |
          mkdir -p results
          SBOM=$(ls current/*.cdx.json | head -1)
          bin/sbom-score --image "${{ steps.meta.outputs.name }}" "$SBOM" \
            > results/score-${{ steps.meta.outputs.name }}.json

      - name: Fetch baseline SBOM
        id: baseline
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the latest successful Build images and SBOMs run, excluding
          # the current triggering run. The build workflow runs on PRs only;
          # the most recent prior successful run serves as baseline.
          CURRENT_RUN_ID="${{ github.event.workflow_run.id }}"
          RUN_ID=$(gh run list \
            --workflow="Build images and SBOMs" \
            --status=success \
            --limit=10 \
            --json databaseId \
            --jq "[.[] | select(.databaseId != ${CURRENT_RUN_ID})] | .[0].databaseId")

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh run download "$RUN_ID" \
            --name "${{ matrix.image.name }}-sbom" \
            --dir baseline/ || {
              echo "has_baseline=false" >> "$GITHUB_OUTPUT"
              exit 0
            }

          echo "has_baseline=true" >> "$GITHUB_OUTPUT"

      - name: Score baseline SBOM
        if: steps.baseline.outputs.has_baseline == 'true'
        run: |
          SBOM=$(ls baseline/*.cdx.json | head -1)
          bin/sbom-score --image "${{ steps.meta.outputs.name }}" "$SBOM" \
            > results/baseline-${{ steps.meta.outputs.name }}.json

      - name: Compare SBOMs
        if: steps.baseline.outputs.has_baseline == 'true'
        run: |
          BASELINE=$(ls baseline/*.cdx.json | head -1)
          CURRENT=$(ls current/*.cdx.json | head -1)
          bin/sbom-compare \
            --baseline "$BASELINE" \
            --current "$CURRENT" \
            --image "${{ steps.meta.outputs.name }}" \
            --policy .github/sbom-policy.json \
            > results/compare-${{ steps.meta.outputs.name }}.json

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: sbom-quality-gate-${{ steps.meta.outputs.name }}
          path: results/

  report:
    needs: [load-matrix, score]
    # Run even if some score jobs failed, but not if the entire score job
    # was skipped (which happens on direct pushes to main where there's no PR).
    if: always() && needs.score.result != 'skipped'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-quality-gate-*
          merge-multiple: true
          path: results/

      - name: Generate report
        id: report
        run: |
          bin/sbom-report --scores-dir results/ > pr-comment.md 2>report-stderr.txt || {
            cat report-stderr.txt >&2
            echo "failed=true" >> "$GITHUB_OUTPUT"
          }

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The workflow_run event doesn't directly give us the PR number.
          # Look it up from the head branch.
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --json number --jq '.[0].number')
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.pr.outputs.number
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: sbom-quality-gate
          number: ${{ steps.pr.outputs.number }}
          path: pr-comment.md

      - name: Fail on regression
        if: steps.report.outputs.failed == 'true'
        run: |
          echo "SBOM quality regression detected. See PR comment for details."
          exit 1
