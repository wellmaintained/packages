name: Setup Nix
description: Install Nix with persistent Nix store via Blacksmith sticky disk

runs:
  using: composite
  steps:
    - name: Persist Nix store
      uses: useblacksmith/stickydisk@v1
      with:
        key: ${{ github.repository }}-nix-${{ runner.os }}
        path: /nix

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v30
      with:
        nix_conf: |
          no-update-lock-file = true
