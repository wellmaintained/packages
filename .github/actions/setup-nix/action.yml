name: Setup Nix
description: Install Nix with Determinate Systems, persistent Nix store via Blacksmith sticky disk, and CI tools from devShells.ci

runs:
  using: composite
  steps:
    - name: Persist Nix store
      uses: useblacksmith/stickydisk@v1
      with:
        key: ${{ github.repository }}-nix-v2-${{ runner.os }}
        path: /nix

    - name: Prepare for Nix install
      shell: bash
      run: |
        # Remove receipt.json so the installer doesn't skip when /nix
        # has been restored from stickydisk cache. The installer needs
        # to run each time to set up the daemon binary and systemd
        # units (which live outside /nix and aren't cached).
        sudo rm -f /nix/receipt.json

    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        diagnostic-endpoint: ""

    - name: Activate CI devshell
      shell: bash
      run: |
        # Add CI tools (cosign, crane, sbomqs, sbomlyze) to PATH.
        # Uses nix print-dev-env instead of `nix build -o` to avoid the
        # broken symlink issue on Blacksmith runners with stickydisk.
        CI_PATH=$(nix print-dev-env .#ci --json | jq -r '.variables.PATH.value')
        echo "$CI_PATH" | tr ':' '\n' | grep '^/nix/store' | while read -r p; do
          echo "$p" >> "$GITHUB_PATH"
        done

    - name: Register nix daemon cleanup for stickydisk
      uses: ./.github/actions/stop-nix-daemon
