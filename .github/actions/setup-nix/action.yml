name: Setup Nix
description: Install Nix with Determinate Systems and persistent Nix store via Blacksmith sticky disk

runs:
  using: composite
  steps:
    - name: Create /nix directory
      shell: bash
      run: sudo mkdir -p /nix/store

    - name: Persist Nix store
      uses: useblacksmith/stickydisk@v1
      with:
        key: ${{ github.repository }}-nix-store-${{ runner.os }}
        path: /nix/store

    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        diagnostic-endpoint: ""

    - name: Register nix daemon cleanup for stickydisk
      uses: ./.github/actions/stop-nix-daemon
