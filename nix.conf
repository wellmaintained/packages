# Nix Configuration for wellmaintained-nixpkgs Binary Cache
#
# This file configures Nix to use the wellmaintained-nixpkgs Cachix binary cache.
# Copy this content to your ~/.config/nix/nix.conf or /etc/nix/nix.conf
#
# Usage:
#   1. Copy this file to your Nix configuration directory
#   2. Restart Nix daemon: sudo systemctl restart nix-daemon
#   3. Verify cache is working: nix build .#go --option substituters https://wellmaintained-nixpkgs.cachix.org

# Binary cache configuration
substituters = https://wellmaintained-nixpkgs.cachix.org https://cache.nixos.org

# Public key for wellmaintained-nixpkgs cache
# Replace <PUBLIC_KEY> with the actual public key from Cachix
# Get it from: https://wellmaintained-nixpkgs.cachix.org
trusted-public-keys = wellmaintained-nixpkgs-1:<PUBLIC_KEY> cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

# Enable flakes (required for this project)
experimental-features = nix-command flakes

# Optional: Configure parallel downloads
# max-jobs = auto

# Optional: Configure build timeout
# build-timeout = 3600

# Optional: Use substituters before building (faster for cached items)
# prefer-substitutes = true