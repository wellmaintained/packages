---
# Adapted from upstream sbomify docker-compose.yml + docker-compose.dev.yml
# Uses nix-built sbomify-app image; upstream images for infrastructure services.

# Common environment variables shared across services
x-common-env: &common-env
  AM_I_IN_DOCKER_CONTAINER: ${AM_I_IN_DOCKER_CONTAINER:-1}
  APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:${HTTP_PORT:-8000}}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
  AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL_S3:-http://sbomify-minio:9000}
  AWS_MEDIA_ACCESS_KEY_ID: ${AWS_MEDIA_ACCESS_KEY_ID:-minioadmin}
  AWS_MEDIA_SECRET_ACCESS_KEY: ${AWS_MEDIA_SECRET_ACCESS_KEY:-minioadmin}
  AWS_MEDIA_STORAGE_BUCKET_NAME: ${AWS_MEDIA_STORAGE_BUCKET_NAME:-sbomify-media}
  AWS_MEDIA_STORAGE_BUCKET_URL: ${AWS_MEDIA_STORAGE_BUCKET_URL:-http://sbomify-minio:9000/sbomify-media}
  AWS_REGION: ${AWS_REGION:-auto}
  AWS_SBOMS_ACCESS_KEY_ID: ${AWS_SBOMS_ACCESS_KEY_ID:-minioadmin}
  AWS_SBOMS_SECRET_ACCESS_KEY: ${AWS_SBOMS_SECRET_ACCESS_KEY:-minioadmin}
  AWS_SBOMS_STORAGE_BUCKET_NAME: ${AWS_SBOMS_STORAGE_BUCKET_NAME:-sbomify-sboms}
  AWS_SBOMS_STORAGE_BUCKET_URL: ${AWS_SBOMS_STORAGE_BUCKET_URL:-http://sbomify-minio:9000/sbomify-sboms}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
  DATABASE_NAME: ${DATABASE_NAME:-sbomify}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-sbomify}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_USER: ${DATABASE_USER:-sbomify}
  DOCKER_DATABASE_HOST: ${DOCKER_DATABASE_HOST:-sbomify-db}
  REDIS_URL: ${REDIS_URL:-redis://sbomify-redis:6379}
  SECRET_KEY: ${SECRET_KEY:-"django-insecure-your-development-secret-key-here-CHANGE-ME!"}
  SIGNED_URL_SALT: ${SIGNED_URL_SALT:-django-insecure-signed-url-salt-CHANGE-ME!}

# Keycloak uses split URLs: browsers reach it at localhost:8180 (KC_HOSTNAME),
# while backend containers reach it at keycloak:8080 (KEYCLOAK_SERVER_URL) via
# Docker Compose's built-in DNS. KC_HOSTNAME_BACKCHANNEL_DYNAMIC ensures the
# OIDC discovery doc returns the right URL for each audience.
x-keycloak-env: &keycloak-env
  KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8180}
  KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
  KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080/}
  KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sbomify}
  KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-sbomify}
  KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-client-secret}

x-keycloak-admin-env: &keycloak-admin-env
  KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
  KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sbomify}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sbomify-minio-secret}
  AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL_S3:-http://sbomify-minio:9000}
  AWS_SBOMS_STORAGE_BUCKET_NAME: ${AWS_SBOMS_STORAGE_BUCKET_NAME:-sbomify-sboms}
  AWS_MEDIA_STORAGE_BUCKET_NAME: ${AWS_MEDIA_STORAGE_BUCKET_NAME:-sbomify-media}

# sbomify-app image reference
# Default: GHCR published image. Override with env vars for local dev images.
x-sbomify-app: &sbomify-app
  image: ${SBOMIFY_IMAGE:-ghcr.io/wellmaintained/packages/sbomify-app}:${SBOMIFY_TAG:-latest}
  pull_policy: ${SBOMIFY_PULL_POLICY:-missing}

services:
  sbomify-db:
    image: ${POSTGRES_IMAGE:-ghcr.io/wellmaintained/packages/postgres}:${POSTGRES_TAG:-latest}
    restart: ${POSTGRES_RESTART_POLICY:-always}
    environment:
      POSTGRES_USER: ${DATABASE_USER:-sbomify}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-sbomify}
      POSTGRES_DB: ${DATABASE_NAME:-sbomify}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sbomify_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-sbomify}"]
      interval: 10s
      timeout: 2s
      retries: 10

  sbomify-redis:
    image: ${REDIS_IMAGE:-ghcr.io/wellmaintained/packages/redis}:${REDIS_TAG:-latest}
    restart: ${REDIS_RESTART_POLICY:-always}
    command: ["--protected-mode", "no"]
    ports:
      - "${REDIS_PORT:-6389}:6379"
    volumes:
      - sbomify_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sbomify-migrations:
    <<: *sbomify-app
    environment:
      <<: *common-env
      BILLING: ${BILLING:-False}
    entrypoint: ["sh", "-c"]
    command: ["../venv/bin/python manage.py migrate --noinput"]
    depends_on:
      sbomify-db:
        condition: service_healthy

  sbomify-backend:
    <<: *sbomify-app
    restart: ${SBOMIFY_RESTART_POLICY:-always}
    deploy:
      replicas: ${BACKEND_REPLICAS:-1}
    environment:
      <<: [*common-env, *keycloak-env]
      BILLING: ${BILLING:-False}
      DATABASE_HOST: ${DATABASE_HOST:-localhost}
    expose:
      - 8000
    depends_on:
      sbomify-db:
        condition: service_healthy
      sbomify-redis:
        condition: service_healthy
      sbomify-migrations:
        condition: service_completed_successfully
      keycloak-bootstrap:
        condition: service_completed_successfully
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "sh", "-c", "../venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/UuPha8mu/')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  sbomify-worker:
    <<: *sbomify-app
    restart: ${SBOMIFY_RESTART_POLICY:-always}
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    environment:
      <<: *common-env
      BILLING: ${BILLING:-False}
    entrypoint: ["../venv/bin/python"]
    command:
      [
        "manage.py",
        "rundramatiq",
        "-p",
        "${DRAMATIQ_PROCESSES:-1}",
        "-t",
        "${DRAMATIQ_THREADS:-4}"
      ]
    depends_on:
      sbomify-redis:
        condition: service_healthy
      sbomify-db:
        condition: service_healthy
    stop_grace_period: 30s

  sbomify-caddy:
    image: ${CADDY_IMAGE:-ghcr.io/wellmaintained/packages/sbomify-caddy-dev}:${CADDY_TAG:-latest}
    restart: ${CADDY_RESTART_POLICY:-always}
    ports:
      - "${BIND_IP:-127.0.0.1}:${HTTP_PORT:-8000}:80"
    environment:
      LOG_LEVEL: ${CADDY_LOG_LEVEL:-INFO}
      CADDY_ADMIN: ${CADDY_ADMIN:-off}
    depends_on:
      - sbomify-backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://sbomify-caddy/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 10s

  keycloak:
    image: ${KEYCLOAK_IMAGE:-ghcr.io/wellmaintained/packages/sbomify-keycloak}:${KEYCLOAK_TAG:-latest}
    restart: ${KEYCLOAK_RESTART_POLICY:-always}
    environment:
      <<: [*keycloak-env, *keycloak-admin-env]
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED:-true}
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health/ready"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  keycloak-bootstrap:
    image: ${KEYCLOAK_IMAGE:-ghcr.io/wellmaintained/packages/sbomify-keycloak}:${KEYCLOAK_TAG:-latest}
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/bin/keycloak-bootstrap.sh"]
    environment:
      <<: [*keycloak-env, *keycloak-admin-env]
      KEYCLOAK_DEV_MODE: ${KEYCLOAK_DEV_MODE:-true}
      APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:${HTTP_PORT:-8000}}

  sbomify-minio:
    image: ${MINIO_IMAGE:-ghcr.io/wellmaintained/packages/minio}:${MINIO_TAG:-latest}
    restart: always
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      <<: *minio-env
    volumes:
      - sbomify_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  sbomify-createbuckets:
    image: ${MINIO_INIT_IMAGE:-ghcr.io/wellmaintained/packages/sbomify-minio-init}:${MINIO_INIT_TAG:-latest}
    depends_on:
      sbomify-minio:
        condition: service_healthy
    environment:
      <<: *minio-env

volumes:
  sbomify_postgres_data:
  sbomify_redis_data:
  keycloak_data:
  sbomify_minio_data:
