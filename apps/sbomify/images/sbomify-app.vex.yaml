  - vulnerability:
      "@id": CVE-2019-1010022
      name: CVE-2019-1010022
      description: >-
        Claimed stack guard bypass in glibc NPTL. Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream — treated as a non-security bug with no
      real threat. Requires a pre-existing stack buffer overflow to exploit,
      making the bypass academic. No fix will be issued.

      References:
      - https://sourceware.org/bugzilla/show_bug.cgi?id=22850 (upstream: not a security bug)
      - https://security-tracker.debian.org/tracker/CVE-2019-1010022 (Debian: unimportant)
      - https://ubuntu.com/security/CVE-2019-1010022 (Ubuntu: negligible)

  - vulnerability:
      "@id": CVE-2019-1010023
      name: CVE-2019-1010023
      description: >-
        Running ldd on a malicious ELF leads to code execution via
        re-mapping of a loaded library. Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream — "not a security bug." Requires an attacker
      to send two ELF files and convince the victim to run ldd on them. The
      ldd utility is not used at runtime in this container.

      References:
      - https://sourceware.org/bugzilla/show_bug.cgi?id=22853 (upstream: not a security bug)
      - https://security-tracker.debian.org/tracker/CVE-2019-1010023 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2019-1010024
      name: CVE-2019-1010024
      description: >-
        GNU glibc ASLR bypass via cache of thread stack and heap addresses.
        Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream — "ASLR bypass itself is not a vulnerability."
      Requires pre-existing code execution. No fix will be issued.

      References:
      - https://sourceware.org/bugzilla/show_bug.cgi?id=22852 (upstream: not a security bug)
      - https://security-tracker.debian.org/tracker/CVE-2019-1010024 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2019-1010025
      name: CVE-2019-1010025
      description: >-
        GNU glibc heap address information leak via pthread thread creation.
        Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream — "ASLR bypass itself is not a vulnerability."
      Attacker may guess heap addresses of pthread-created threads. Requires
      pre-existing code execution. No fix will be issued.

      References:
      - https://sourceware.org/bugzilla/show_bug.cgi?id=22851 (upstream: not a security bug)
      - https://security-tracker.debian.org/tracker/CVE-2019-1010025 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2010-4756
      name: CVE-2010-4756
      description: >-
        glibc glob implementation allows resource exhaustion via crafted
        glob patterns (GLOB_LIMIT bypass).
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Ancient (2010) denial-of-service via crafted glob patterns. Our
      application does not expose glob expansion to untrusted input. Disputed
      by upstream as a configuration/resource-limit issue rather than a
      library bug. No fix will be issued.

      References:
      - https://security-tracker.debian.org/tracker/CVE-2010-4756 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2025-15281
      name: CVE-2025-15281
      description: >-
        Use of uninitialized resource in glibc wordexp with WRDE_REUSE +
        WRDE_APPEND flags, causing crash on wordfree.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      The wordexp function is a shell-word-expansion C function. Python/Django
      does not call wordexp — the vulnerable code path is never exercised.
      Fixed in glibc 2.43 (not yet in nixpkgs).

  - vulnerability:
      "@id": CVE-2026-0861
      name: CVE-2026-0861
      description: >-
        Integer overflow in glibc memalign/posix_memalign/aligned_alloc
        leading to heap corruption.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Exploitation requires attacker control of both size and alignment
      arguments to memalign. Python/Django does not expose these C allocation
      functions to user-controlled input. Fixed in glibc 2.43 (not yet in
      nixpkgs).

  - vulnerability:
      "@id": CVE-2026-0915
      name: CVE-2026-0915
      description: >-
        glibc getnetbyaddr/getnetbyaddr_r leak stack contents to DNS
        resolver when called with network value of zero. Bug present since 1996.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Python/Django does not call getnetbyaddr with zero network values.
      The affected C function is not in the application's execution path.
      Fixed in glibc 2.43 (not yet in nixpkgs).

  - vulnerability:
      "@id": CVE-2026-4046
      name: CVE-2026-4046
      description: >-
        Reachable assertion failure in glibc iconv when processing untrusted
        input, causing crash (DoS). GLIBC-SA-2026-0007.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      The vulnerable IBM1390/IBM1399 gconv modules have been stripped from
      the image via stripFromLayers. Additionally, Python handles character
      encoding internally via its own codec system, not glibc iconv. Fixed
      in glibc 2.43 (not yet in nixpkgs).

  - vulnerability:
      "@id": CVE-2026-4437
      name: CVE-2026-4437
      description: >-
        DNS specification violation in glibc gethostbyaddr/gethostbyaddr_r —
        non-answer section of DNS response treated as valid answer.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Django uses getaddrinfo (forward lookups), not gethostbyaddr (reverse
      lookups). The affected code path is not exercised. Patch proposed
      upstream (sourceware bug #34014), not yet in a released glibc.

  - vulnerability:
      "@id": CVE-2026-4438
      name: CVE-2026-4438
      description: >-
        Improper input validation in glibc gethostbyaddr/gethostbyaddr_r —
        can return invalid DNS hostnames violating DNS specs, potentially
        bypassing hostname-based access controls.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Django uses getaddrinfo (forward lookups), not gethostbyaddr (reverse
      lookups). The application does not use reverse DNS for security
      decisions. Patch proposed upstream, not yet in a released glibc.

  - vulnerability:
      "@id": CVE-2026-2673
      name: CVE-2026-2673
      description: >-
        OpenSSL TLS 1.3 server may fail to negotiate the preferred post-quantum
        key exchange group when using the DEFAULT keyword in group configuration.
    products:
      - "@id": pkg:nix/openssl@3.6.1
    status: affected
    action_statement: >-
      Fix available in OpenSSL 3.6.2 (released 2026-03-13). Waiting on
      upstream nixpkgs to bump openssl from 3.6.1 to 3.6.2.

      Reduced severity in our deployment: the sbomify-app sits behind a
      reverse proxy and is not directly internet-facing. The vulnerability
      only affects TLS 1.3 server group negotiation when using the DEFAULT
      keyword — the connection still uses a secure classical key exchange
      (e.g. X25519). No data exposure, authentication bypass, or denial
      of service is possible.

      References:
      - https://openssl-library.org/news/secadv/20260313.txt (advisory)
      - https://github.com/openssl/openssl/commit/85977e013f32ceb96aa034c0e741adddc1a05e34 (fix)

  - vulnerability:
      "@id": CVE-2023-4039
      name: CVE-2023-4039
      description: >-
        GCC -fstack-protector fails to detect buffer overflows in
        dynamically-sized local variables on AArch64.
    products:
      - "@id": pkg:nix/gcc@15.2.0
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      AArch64-only vulnerability — our images are built for x86_64 where
      the stack protector works correctly. Additionally disputed by the GCC
      project as a missed hardening bug, not a vulnerability. Requires a
      pre-existing buffer overflow to exploit.

      References:
      - https://developer.arm.com/Arm%20Security%20Center/GCC%20Stack%20Protector%20Vulnerability%20AArch64 (Arm advisory: AArch64 only)
      - https://github.com/metaredteam/external-disclosures/security/advisories/GHSA-x7ch-h5rf-w2mf (disclosure)

