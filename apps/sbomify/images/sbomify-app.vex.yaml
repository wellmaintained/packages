  # --- rollup (1 GHSA × 2 versions = 2 alerts) ---

  - vulnerability:
      "@id": GHSA-mw96-cpmx-2vgc
      name: GHSA-mw96-cpmx-2vgc
      description: >-
        rollup arbitrary file write via path traversal during bundle
        generation.
    products:
      - "@id": pkg:npm/rollup@2.79.2
      - "@id": pkg:npm/rollup@4.45.1
    status: not_affected
    justification: inline_mitigations_already_exist
    impact_statement: >-
      Rollup is vite's bundler and its vulnerable bundle.write() code
      path IS executed during every build. However, the Nix build sandbox
      constrains the blast radius: builds run in a chroot with the Nix
      store mounted read-only, only $out is writable, and network access
      is disabled. A path traversal could corrupt files within the build
      output but cannot escape the sandbox to affect the host or Nix
      store. All npm dependencies are pinned via bun.nix lockfile with
      integrity hashes, limiting supply-chain injection risk. Rollup
      itself is not included in the runtime container image.

  # --- serialize-javascript (2 GHSAs × 1 version = 2 alerts) ---

  - vulnerability:
      "@id": GHSA-5c6j-r48x-rmvq
      name: GHSA-5c6j-r48x-rmvq
      description: >-
        serialize-javascript RCE via RegExp.flags and
        Date.prototype.toISOString() during serialization.
    products:
      - "@id": pkg:npm/serialize-javascript@6.0.2
    status: affected
    action_statement: >-
      serialize-javascript is used by vite/terser internals during the
      build — its vulnerable serialization code IS executed, and its
      output (serialized JS chunks) ends up in the browser bundle. An
      RCE during the build could write arbitrary content to $out,
      injecting backdoors into the JS served to users. The Nix build
      sandbox protects the host (no network, read-only store, chroot)
      but explicitly permits writes to $out — the one thing a
      supply-chain attacker needs.

      Barriers to exploitation: all npm dependencies are pinned via
      bun.nix with integrity hashes, so an attacker cannot substitute
      a malicious tarball without changing the lockfile (a code-reviewed
      artifact). However, this protects against tampering after pinning,
      not against a package that was already compromised when pinned.

      Fix available in serialize-javascript >= 6.0.3. Remediation
      requires updating the transitive dependency via upstream sbomify
      or overriding in bun.nix.

  - vulnerability:
      "@id": GHSA-qj8w-gfj5-8c6v
      name: GHSA-qj8w-gfj5-8c6v
      description: >-
        serialize-javascript CPU exhaustion DoS via crafted array-like
        objects.
    products:
      - "@id": pkg:npm/serialize-javascript@6.0.2
    status: affected
    action_statement: >-
      serialize-javascript runs during the vite build. CPU exhaustion
      during the build would prevent deployment of security patches — a
      DoS against the build pipeline. The Nix sandbox does not mitigate
      CPU exhaustion. All npm dependencies are pinned via bun.nix with
      integrity hashes, which limits supply-chain injection but does not
      prevent it if a package was compromised before pinning.

      Fix available in serialize-javascript >= 7.0.5. Remediation
      requires updating the transitive dependency via upstream sbomify
      or overriding in bun.nix.

