  # --- axios (1 GHSA × 1 version = 1 alert) ---
  # NOTE: axios is a RUNTIME dependency — it is imported by
  # sbomify/apps/core/js/utils.ts and bundled by vite into the JS
  # served to browsers. It is the frontend's HTTP client.
  #
  # Adversarial review (2026-04-05) found that mergeConfig() — the
  # vulnerable function — only processes developer-authored config
  # objects during request setup. API response bodies flow through
  # dispatchRequest and interceptors, never into config merging.
  # The __proto__ key payload cannot be delivered via server response.

  - vulnerability:
      "@id": GHSA-43fc-jf86-j433
      name: GHSA-43fc-jf86-j433
      description: >-
        axios DoS via __proto__ key in mergeConfig (prototype pollution
        in config merging).
    products:
      - "@id": pkg:npm/axios@1.13.2
    status: not_affected
    justification: vulnerable_code_not_reachable
    impact_statement: >-
      axios is bundled into the frontend JS (imported in
      sbomify/apps/core/js/utils.ts), but the vulnerable mergeConfig()
      function only processes developer-authored config literals during
      request setup. API response bodies flow through dispatchRequest
      and interceptors — they never enter mergeConfig. An attacker
      cannot deliver the __proto__ payload via a crafted API response
      or any other external input.

      Upgrade to axios 1.13.5 is recommended as routine dependency
      maintenance, but there is no active exploitable path in sbomify's
      usage pattern.

