# VEX (Vulnerability Exploitability eXchange) statements for the sbomify-keycloak image.
# Grype consumes these to suppress findings that don't apply.
# The release website renders them as compliance evidence.
#
# Add a statement when a CVE is triaged as not_affected or mitigated.
# See https://openvex.dev for the full specification.
#
# Example:
#   statements:
#     - vulnerability:
#         "@id": CVE-2024-XXXXX
#         name: CVE-2024-XXXXX
#       products:
#         - "@id": "pkg:nix/packagename@version"
#       status: not_affected
#       justification: vulnerable_code_not_in_execute_path
#       impact_statement: >-
#         The affected function is never called in our deployment.

"@context": https://openvex.dev/ns/v0.2.0
"@id": https://github.com/wellmaintained/packages/vex/sbomify-keycloak
author: wellmaintained/packages maintainers
timestamp: "2026-04-05T00:00:00Z"
statements:
  # ── glibc 2.42 (disputed CVEs) ──────────────────────────────────────

  - vulnerability:
      "@id": CVE-2019-1010022
      name: CVE-2019-1010022
      description: >-
        Claimed stack guard bypass in glibc NPTL. Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream — treated as a non-security bug. Requires
      a pre-existing stack buffer overflow to exploit. No fix will be issued.

      References:
      - https://sourceware.org/bugzilla/show_bug.cgi?id=22850 (upstream: not a security bug)
      - https://security-tracker.debian.org/tracker/CVE-2019-1010022 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2019-1010023
      name: CVE-2019-1010023
      description: >-
        Claimed trampoline pointer overwrite in glibc. Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream. No fix will be issued.

      References:
      - https://security-tracker.debian.org/tracker/CVE-2019-1010023 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2019-1010024
      name: CVE-2019-1010024
      description: >-
        Claimed ASLR bypass via /proc/self/maps in glibc. Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream. Requires local access to /proc/self/maps.
      No fix will be issued.

      References:
      - https://security-tracker.debian.org/tracker/CVE-2019-1010024 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2019-1010025
      name: CVE-2019-1010025
      description: >-
        Claimed heap address disclosure via __abort_msg in glibc. Disputed by upstream.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Disputed by glibc upstream. No remote exploitation path. No fix will
      be issued.

      References:
      - https://security-tracker.debian.org/tracker/CVE-2019-1010025 (Debian: unimportant)

  - vulnerability:
      "@id": CVE-2010-4756
      name: CVE-2010-4756
      description: >-
        glibc glob implementation allows resource exhaustion via crafted
        glob expressions.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Keycloak does not use glob() on user-supplied input. Ancient CVE from
      2010, no upstream fix planned.

      References:
      - https://security-tracker.debian.org/tracker/CVE-2010-4756 (Debian: unimportant)

  # ── openssl 3.6.1 ───────────────────────────────────────────────────

  - vulnerability:
      "@id": CVE-2026-2673
      name: CVE-2026-2673
      description: >-
        OpenSSL TLS 1.3 server may fail to negotiate the preferred post-quantum
        key exchange group when using the DEFAULT keyword in group configuration.
    products:
      - "@id": pkg:nix/openssl@3.6.1
    status: affected
    action_statement: >-
      Fix available in OpenSSL 3.6.2 (released 2026-03-13). Waiting on
      upstream nixpkgs to bump openssl from 3.6.1 to 3.6.2.

      Reduced severity: Keycloak sits behind a reverse proxy and is not
      directly internet-facing. The connection still uses a secure classical
      key exchange.

      References:
      - https://openssl-library.org/news/secadv/20260313.txt (advisory)

  # ── gcc 15.2.0 ──────────────────────────────────────────────────────

  - vulnerability:
      "@id": CVE-2023-4039
      name: CVE-2023-4039
      description: >-
        GCC -fstack-protector fails to detect buffer overflows in
        dynamically-sized local variables on AArch64.
    products:
      - "@id": pkg:nix/gcc@15.2.0
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      The full gcc-lib store path (including the GCC compiler's runtime
      libraries) has been stripped from the image via buildCompliantImage's
      removeGccReferences option. Only a minimal runtime containing
      libstdc++ and libgcc_s remains, under a store path named
      "gcc-minimal-runtime" that does not include the vulnerable GCC
      compiler code. Additionally, CVE-2023-4039 is AArch64-only and
      our images are built for x86_64.

      References:
      - https://developer.arm.com/Arm%20Security%20Center/GCC%20Stack%20Protector%20Vulnerability%20AArch64

  # ── coreutils 9.10 ──────────────────────────────────────────────────

  - vulnerability:
      "@id": CVE-2016-2781
      name: CVE-2016-2781
      description: >-
        chroot in GNU coreutils does not properly restrict additional
        supplementary group privileges after changing to a new root directory.
    products:
      - "@id": pkg:nix/coreutils@9.10
    status: affected
    action_statement: >-
      The chroot binary is present in the image via coreutils even though
      it is not used by our workloads. Planned mitigation: replace
      coreutils with busybox in container images.

      References:
      - https://security-tracker.debian.org/tracker/CVE-2016-2781 (Debian: low)

  # ── glibc 2.42 (2025/2026 CVEs — 3 fixed in 2.42-51 via backport, 3 no fix yet) ─

  - vulnerability:
      "@id": CVE-2025-15281
      name: CVE-2025-15281
      description: >-
        wordexp with WRDE_REUSE + WRDE_APPEND returns uninitialized memory.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      Fixed in nixpkgs glibc 2.42-51 via 2.42-master.patch (cherry-picked
      from upstream). The vulnerable wordexp WRDE_REUSE+WRDE_APPEND code
      path has been patched.

  - vulnerability:
      "@id": CVE-2026-0861
      name: CVE-2026-0861
      description: >-
        Integer overflow in memalign when alignment is near PTRDIFF_MAX.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      Fixed in nixpkgs glibc 2.42-51 via 2.42-master.patch (cherry-picked
      from upstream). The memalign alignment overflow check has been
      reinstated.

  - vulnerability:
      "@id": CVE-2026-0915
      name: CVE-2026-0915
      description: >-
        getnetbyaddr with DNS backend leaks stack contents for zero-valued
        network queries.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      Fixed in nixpkgs glibc 2.42-51 via 2.42-master.patch (cherry-picked
      from upstream). The getnetbyaddr DNS backend stack leak has been
      patched.

  - vulnerability:
      "@id": CVE-2026-4046
      name: CVE-2026-4046
      description: >-
        iconv() crashes when converting from IBM1390 or IBM1399 charsets.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_present
    impact_statement: >-
      The vulnerable IBM1390.so and IBM1399.so gconv modules are stripped
      from image layers at build time via buildCompliantImage's
      stripFromLayers parameter. iconv() will return "conversion not
      supported" instead of loading the vulnerable code.

  - vulnerability:
      "@id": CVE-2026-4437
      name: CVE-2026-4437
      description: >-
        gethostbyaddr DNS response parsing may treat non-answer sections
        as valid answers.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: affected
    action_statement: >-
      Java's InetAddress.getHostName() performs reverse DNS lookups via
      getnameinfo()/gethostbyaddr() on glibc-based containers. Keycloak
      uses this for audit logging and client identification. A crafted DNS
      response from a compromised resolver could return spoofed hostnames.

      No upstream fix yet (affects through glibc 2.43). Reduced severity:
      Keycloak sits behind a reverse proxy; reverse DNS is used for
      logging, not access control decisions.

  - vulnerability:
      "@id": CVE-2026-4438
      name: CVE-2026-4438
      description: >-
        gethostbyaddr with DNS backend may return invalid DNS hostnames.
    products:
      - "@id": pkg:nix/glibc@2.42
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      Keycloak (Java) uses Java's InetAddress, not glibc's gethostbyaddr.
      No upstream fix yet (affects through glibc 2.43).

  # ── busybox 1.37.0 ────────────────────────────────────────────────

  - vulnerability:
      "@id": CVE-2024-58251
      name: CVE-2024-58251
      description: >-
        In netstat in BusyBox through 1.37.0, local users can launch a
        network application with an argv[0] containing an ANSI terminal
        escape sequence, causing denial of service (terminal lockup) when
        netstat is used by a victim.
    products:
      - "@id": pkg:nix/busybox@1.37.0
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      The netstat applet is not used in this image. BusyBox is included
      solely for basic file operations (mkdir, chmod, chown, cp, ln)
      needed during container initialisation. The netstat code path is
      never executed.

      References:
      - https://github.com/advisories/GHSA-rrv5-483w-xmr9

  - vulnerability:
      "@id": CVE-2025-46394
      name: CVE-2025-46394
      description: >-
        In tar in BusyBox through 1.37.0, a TAR archive can have filenames
        hidden from directory listings via terminal escape sequences.
    products:
      - "@id": pkg:nix/busybox@1.37.0
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      The tar applet is not used in this image. BusyBox is included solely
      for basic file operations (mkdir, chmod, chown, cp, ln) needed
      during container initialisation. No tar archives are listed or
      extracted.

      References:
      - https://github.com/advisories/GHSA-wp4q-9jq4-gv74

  - vulnerability:
      "@id": CVE-2025-60876
      name: CVE-2025-60876
      description: >-
        BusyBox wget through 1.37.0 accepts raw CR/LF and other C0 control
        bytes in the HTTP request-target, allowing request-line splitting
        and header injection.
    products:
      - "@id": pkg:nix/busybox@1.37.0
    status: not_affected
    justification: vulnerable_code_not_in_execute_path
    impact_statement: >-
      The wget applet is not used in this image. BusyBox is included
      solely for basic file operations (mkdir, chmod, chown, cp, ln)
      needed during container initialisation. No HTTP requests are made
      via BusyBox wget.

      References:
      - https://www.cvedetails.com/cve/CVE-2025-60876/
