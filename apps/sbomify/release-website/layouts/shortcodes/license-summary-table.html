{{- $data := hugo.Data.licenses -}}
{{- if $data -}}
<table>
<thead><tr><th>License</th><th>Components</th></tr></thead>
<tbody>
{{- range $data.summary }}
<tr><td><a href="https://spdx.org/licenses/{{ .license }}.html">{{ .license }}</a></td><td>{{ .count }}</td></tr>
{{- end }}
</tbody>
</table>
{{- else -}}
<em>License data not available. Run <code>just release-website-extract</code>.</em>
{{- end -}}
