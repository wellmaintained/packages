<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Box interior (visible through open top) -->
  <rect x="8" y="12" width="28" height="10" rx="1" fill="#8B6914"/>

  <!-- Box body front face -->
  <rect x="6" y="20" width="32" height="22" rx="2" fill="#C4A35A"/>

  <!-- Box body right face (3D depth) -->
  <polygon points="38,20 44,16 44,38 38,42" fill="#A07D30"/>

  <!-- Box body bottom edge -->
  <polygon points="6,42 38,42 44,38 12,38" fill="#917228"/>

  <!-- Tape vertical (front face) -->
  <rect x="19" y="20" width="6" height="22" fill="#EBD9A8" opacity="0.5"/>

  <!-- Open flap left -->
  <polygon points="6,20 22,20 16,10 2,12" fill="#D9BE6E"/>
  <line x1="6" y1="20" x2="2" y2="12" stroke="#B8923E" stroke-width="0.5"/>

  <!-- Open flap right -->
  <polygon points="22,20 38,20 44,16 28,10" fill="#BF9B49"/>
  <line x1="38" y1="20" x2="44" y2="16" stroke="#A07D30" stroke-width="0.5"/>

  <!-- Tape on flaps -->
  <polygon points="19,20 22,20 19,10 16,10" fill="#EBD9A8" opacity="0.4"/>
  <polygon points="22,20 25,20 28,10 22,10" fill="#EBD9A8" opacity="0.3"/>

  <!-- Green check badge -->
  <circle cx="38" cy="12" r="8" fill="#43A047" stroke="white" stroke-width="1.5"/>
  <polyline points="33,12 36.5,15.5 43,9" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
