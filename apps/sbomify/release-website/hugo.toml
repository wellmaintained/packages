baseURL = 'https://wellmaintained.github.io/packages/'
languageCode = 'en-us'
title = 'wellmaintained/packages'
ignoreLogs = ['warning-goldmark-raw-html']

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "Compliance-ready container images with SBOMs, quality scores, and audit evidence."

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    displayPoweredBy = false

  [params.page]
    width = "wide"

[[menu.main]]
  name = "Images"
  pageRef = "/images"
  weight = 1

[[menu.main]]
  name = "Compliance"
  pageRef = "/compliance"
  weight = 2

[[menu.main]]
  name = "Guides"
  pageRef = "/guides"
  weight = 3
